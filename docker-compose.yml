services:
  postgres:
    image: postgres:16-alpine
    container_name: vtj-postgres
    environment:
      POSTGRES_DB: vtj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - vtj-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vtj"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vtj-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - vtj-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vtj-server:
    build: .
    container_name: vtj-server
    ports:
      - "9527:9527"
    environment:
      VTJ_DB_URL: jdbc:postgresql://postgres:5432/vtj
      VTJ_DB_USERNAME: postgres
      VTJ_DB_PASSWORD: postgres
      VTJ_REDIS_HOST: redis
      VTJ_REDIS_PORT: 6379
      VTJ_SQL_INIT: always
      VTJ_STORAGE_ROOT: /app/data
      VTJ_STATIC_DIR: /app/data/static
    volumes:
      - vtj-server-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vtj-postgres-data:
  vtj-redis-data:
  vtj-server-data:
