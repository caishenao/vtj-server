spring.application.name=vtj-server
server.port=${SERVER_PORT:9527}

spring.datasource.url=${VTJ_DB_URL:jdbc:postgresql://localhost:5432/vtj}
spring.datasource.username=${VTJ_DB_USERNAME:postgres}
spring.datasource.password=${VTJ_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=${VTJ_SQL_INIT:always}
spring.sql.init.schema-locations=classpath:schema.sql

spring.data.redis.host=${VTJ_REDIS_HOST:localhost}
spring.data.redis.port=${VTJ_REDIS_PORT:6379}
spring.data.redis.password=${VTJ_REDIS_PASSWORD:}
spring.data.redis.timeout=2s

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis-plus.global-config.db-config.id-type=assign_uuid

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

vtj.project.default-id=${VTJ_PROJECT_ID:vtj-pro}
vtj.project.default-name=${VTJ_PROJECT_NAME:VTJ Pro}
vtj.project.default-platform=${VTJ_PROJECT_PLATFORM:web}
vtj.project.static-base=${VTJ_STATIC_BASE:/}
vtj.project.remote=${VTJ_REMOTE:http://localhost:9527}
vtj.project.auth-url=${VTJ_AUTH_URL:/login}
vtj.storage.root=${VTJ_STORAGE_ROOT:./data}
vtj.storage.static-dir=${VTJ_STATIC_DIR:./data/static}
